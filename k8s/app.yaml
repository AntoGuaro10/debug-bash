apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-bash
  namespace: debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug-bash
  template:
    metadata:
      labels:
        app: debug-bash
    spec:
      containers:
      - name: app
        image: ghcr.io/antoguaro10/bash-custom:1.0
        ports:
        - containerPort: 9090
        resources:
          limits:
            cpu: 100m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: debug-bash
  namespace: debug
  annotations:
      prometheus.io/scrape: 'true'
      prometheus.io/port:   '9090'
spec:
  ports:
  - port: 9090
    targetPort: 9090
  selector:
    app: debug-bash
